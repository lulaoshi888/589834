name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build APK in Docker
        run: |
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            ghcr.io/kivy/buildozer:latest \
            bash -c "echo y | buildozer android debug --verbose" 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: parity-analysis-apk
          path: bin/*.apk
          retention-days: 30
